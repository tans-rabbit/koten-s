    <label style="margin-left:1em;"><input type="radio" name="mode" value="author"> 作者名</label>
    <span id="partPicker" style="margin-left: 8px; display:none;">

  <p id="hint" class="muted"></p>

  <!-- ▼ 操作 -->

  <button id="nextBtn" disabled>次の問題へ</button>

  };

  // ======= ユーティリティ =====================================================
  // 歴史的仮名遣いの厳密一致向け（前後空白/全角空白/連続スペース/全角英数->半角を整理）
  function normalizeForExactHistorical(str){
    if(!str) return "";
    let s = str.trim();
    s = s.replace(/[！-～]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0)); // 全角英数→半角
    s = s.replace(/　/g, ' ');    // 全角スペース→半角
    s = s.replace(/\s+/g, ' ');       // 連続スペース→1
    s = s.toLowerCase();               // 念のため
    return s;
  }

  // 作者名の比較用（空白除去のみ。漢字そのものの一致で判定）
  function normalizeAuthor(str){
    if(!str) return "";
    let s = str.trim();
    s = s.replace(/　/g, ''); // 全角スペース除去
    s = s.replace(/\s+/g, '');    // 半角スペース除去
    return s;
  }

  function getMode(){
    const r = els.modeBox.querySelector('input[name="mode"]:checked');
    return r ? r.value : 'full';
  }

  function getSegments(n){
    const raw = ANSWERS[n];
    return raw ? raw.split(/\s+/) : null;
  }

  // 範囲内ランダム番号
  function getRandomInRange(){
    let from = parseInt(els.rangeFrom.value, 10);
    let to = parseInt(els.rangeTo.value, 10);
    if(isNaN(from)) from = 1;
    if(isNaN(to)) to = 100;
    from = Math.min(100, Math.max(1, from));
    to   = Math.min(100, Math.max(1, to));
    if(from > to){ const t = from; from = to; to = t; els.rangeFrom.value = from; els.rangeTo.value = to; }
    const xs = [];
    for(let n=from; n<=to; n++){ if(ANSWERS[n]) xs.push(n); }
    if(xs.length === 0){ alert('指定範囲に有効な問題がありません。1〜100の中で設定してください。'); return null; }
    return xs[Math.floor(Math.random()*xs.length)];
  }

  // 出題
  function ask(){
    const n = getRandomInRange();
    if(n == null) return;
    currentNumber = n;
    currentPart = null;

    const mode = getMode();
    els.result.textContent = '';
    els.correct.textContent = '';
    els.hint.textContent = '';

    if(mode === 'full'){
      els.question.textContent = `第${n}首`;
      els.answer.placeholder = '和歌の全文を入力';
    } else if(mode === 'part'){
      const segs = getSegments(n);
      if(!segs || segs.length !== 5){ els.question.textContent = `第${n}首（データ未登録）`; return; }
      let k = els.partSelect.value === 'rand' ? (1 + Math.floor(Math.random()*5)) : parseInt(els.partSelect.value,10);
      if(!(1 <= k && k <= 5)) k = 1;
      currentPart = k;
      els.question.textContent = `第${n}首・第${k}句を入力（ひらがな・歴史的仮名遣い）`;
      const hint = segs.map((s,i)=> i===k-1 ? '（　　？　　）' : s).join(' ');
      els.hint.textContent = `${hint}`;
    } else if(mode === 'author'){
      els.question.textContent = `第${n}首・作者名を漢字で入力`;
      els.hint.textContent = `${ANSWERS[n]}`;
      els.answer.placeholder = '作者名を漢字で入力';
    }

    els.answer.value = '';
    els.answer.focus();
    els.nextBtn.disabled = true; // 判定後に有効化
  }

  // 判定
  function judge(){
    if(currentNumber == null) return;
    const mode = getMode();

    if(mode === 'full'){
      const user = normalizeForExactHistorical(els.answer.value);
      const expected = normalizeForExactHistorical(ANSWERS[currentNumber]);
      if(user && user === expected){ els.result.textContent = '正解！'; els.result.className='ok'; }
      else { els.result.textContent = '不正解…'; els.result.className='ng'; els.correct.textContent = `正答：${ANSWERS[currentNumber]}`; }
    }
    else if(mode === 'part'){
      const segs = getSegments(currentNumber);
      if(!segs) { els.result.textContent = 'この番号の正答が未登録です。ANSWERSを確認してください。'; return; }
      const k = currentPart || 1;
      const user = normalizeForExactHistorical(els.answer.value);
      const expected = normalizeForExactHistorical(segs[k-1]);
      if(user && user === expected){ els.result.textContent = '正解！'; els.result.className='ok'; }
      else { els.result.textContent = '不正解…'; els.result.className='ng'; els.correct.textContent = `正答（第${k}句）：${segs[k-1]}`; }
    }
    else if(mode === 'author'){
      const user = normalizeAuthor(els.answer.value);
      const expected = normalizeAuthor(AUTHORS[currentNumber] || '');
      const aliasList = (ALIASES[currentNumber] || []).map(normalizeAuthor);
      const ok = (user && (user === expected || aliasList.includes(user)));
      if(ok){ els.result.textContent = '正解！'; els.result.className='ok'; }
      else {
        const aliasesTxt = (ALIASES[currentNumber] && ALIASES[currentNumber].length) ? `（別表記：${ALIASES[currentNumber].join('／')}）` : '';
        els.result.textContent = '不正解…'; els.result.className='ng';
        els.correct.textContent = `正答：${AUTHORS[currentNumber]}${aliasesTxt}`;
      }
    }

    els.nextBtn.disabled = false;
  }

  // ======= イベント ===========================================================
  els.askBtn.addEventListener('click', ask);
  els.nextBtn.addEventListener('click', ask);
  els.form.addEventListener('submit', (e)=>{ e.preventDefault(); judge(); });

  els.modeBox.addEventListener('change', ()=>{
    const m = getMode();
    els.partPicker.style.display = (m === 'part') ? 'inline-block' : 'none';
    // プレースホルダ更新
    if(m === 'full')      els.answer.placeholder = '和歌の全文を入力';
    else if(m === 'part') els.answer.placeholder = '空欄に入る句を入力';
    else if(m === 'author') els.answer.placeholder = '作者名を漢字で入力';
  });
  </script>
</body>
</html>
